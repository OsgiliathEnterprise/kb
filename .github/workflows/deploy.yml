name: CI - Build Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - gh-pages

permissions:
  contents: read

jobs:
  build:
    name: Build Osgiliath KB
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check for broken links
        run: |
          echo "Build completed successfully"
          echo "Output files: $(ls build/ | wc -l)"
