<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d48b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a6d2b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Crown (top of Osgiliath - City of Kings) -->
  <path d="M 25 45 L 35 25 L 42 35 L 50 20 L 58 35 L 65 25 L 75 45" 
        fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M 25 45 L 75 45" 
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Bridge arches (Osgiliath's great bridges) -->
  <path d="M 20 60 Q 35 50 50 55 Q 65 50 80 60" 
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 20 65 Q 35 55 50 60 Q 65 55 80 65" 
        fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Water waves (Anduin river) -->
  <path d="M 15 75 Q 25 72 35 75 Q 45 78 55 75 Q 65 72 75 75 Q 85 78 90 75" 
        fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 15 80 Q 25 77 35 80 Q 45 83 55 80 Q 65 77 75 80 Q 85 83 90 80" 
        fill="none" stroke="url(#gold)" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Pillars -->
  <line x1="35" y1="55" x2="35" y2="75" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="55" x2="50" y2="80" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="55" x2="65" y2="75" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Star/white tree symbol -->
  <path d="M 50 30 L 51 33 L 54 33 L 52 35 L 53 38 L 50 36 L 47 38 L 48 35 L 46 33 L 49 33 Z" 
        fill="url(#gold)" opacity="0.8"/>
</svg>
