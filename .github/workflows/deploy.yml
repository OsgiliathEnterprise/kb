name: CI - Build and Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build Osgiliath KB
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          GOOGLE_SEARCH_CONSOLE_META_KEY: ${{ secrets.GOOGLE_SEARCH_CONSOLE_META_KEY }}

      - name: Check build output
        run: |
          echo "Build completed successfully"
          echo "Output files: $(ls build/ | wc -l)"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          GOOGLE_SEARCH_CONSOLE_META_KEY: ${{ secrets.GOOGLE_SEARCH_CONSOLE_META_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./build
          force_orphan: true
          commit_message: "deploy: KB website update"

      - name: Ping Google Search Console
        run: |
          SITEMAP_URL="https://osgiliathenterprise.github.io/kb/sitemap.xml"
          GOOGLE_PING="https://www.google.com/webmasters/sitemaps/ping?sitemap=${SITEMAP_URL}"

          echo "Pinging Google at: ${GOOGLE_PING}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${GOOGLE_PING}" || echo "000")

          echo "Google responded with HTTP ${HTTP_CODE}"

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::warning::Google sitemap ping returned HTTP ${HTTP_CODE}"
          else
            echo "Google sitemap ping successful"
          fi

      - name: Fetch and count sitemap URLs
        run: |
          SITEMAP_URL="https://osgiliathenterprise.github.io/kb/sitemap.xml"
          curl -s --max-time 10 "${SITEMAP_URL}" > /tmp/sitemap.xml || { echo "::error::Failed to fetch sitemap"; exit 1; }
          URL_COUNT=$(grep -o '<loc>' /tmp/sitemap.xml | wc -l)
          echo "Sitemap contains ${URL_COUNT} URLs"
